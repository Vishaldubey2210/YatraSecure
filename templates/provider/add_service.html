{% extends "base.html" %}

{% block title %}Add Service - YatraSecure{% endblock %}

{% block content %}
<style>
    body {
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        min-height: 100vh;
    }
    
    .add-service-container {
        max-width: 600px;
        margin: 50px auto;
        padding: 0 20px;
    }
    
    .service-card {
        background: white;
        border-radius: 25px;
        padding: 40px;
        box-shadow: 0 10px 40px rgba(0,0,0,0.2);
    }
    
    .form-header {
        text-align: center;
        margin-bottom: 30px;
    }
    
    .form-header h2 {
        font-size: 2rem;
        font-weight: 700;
        color: #333;
        margin-bottom: 10px;
    }
    
    .form-group {
        margin-bottom: 20px;
    }
    
    .form-label {
        font-weight: 600;
        color: #333;
        margin-bottom: 8px;
        display: block;
    }
    
    .form-control {
        width: 100%;
        padding: 12px 18px;
        border: 2px solid #e0e0e0;
        border-radius: 12px;
        font-size: 1rem;
        transition: all 0.3s ease;
    }
    
    .form-control:focus {
        border-color: #667eea;
        outline: none;
        box-shadow: 0 0 0 0.2rem rgba(102, 126, 234, 0.15);
    }
    
    .btn-submit {
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        color: white;
        border: none;
        padding: 15px;
        border-radius: 12px;
        font-size: 1.1rem;
        font-weight: 600;
        width: 100%;
        cursor: pointer;
        transition: all 0.3s ease;
    }
    
    .btn-submit:hover {
        transform: translateY(-2px);
        box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4);
    }
</style>

<div class="add-service-container">
    <div class="service-card">
        <div class="form-header">
            <h2><i class="bi bi-plus-circle-fill text-primary"></i> Add New Service</h2>
            <p style="color: #666;">Fill in the details about your service</p>
        </div>
        
        <form method="POST" action="{{ url_for('provider.add_service') }}">
            <div class="form-group">
                <label class="form-label">Service Name *</label>
                <input type="text" name="service_name" class="form-control" placeholder="e.g., Deluxe Room, City Tour" required>
            </div>
            
            <div class="form-group">
                <label class="form-label">Description</label>
                <textarea name="description" class="form-control" rows="4" placeholder="Describe your service..."></textarea>
            </div>
            
            <div class="row">
                <div class="col-md-6">
                    <div class="form-group">
                        <label class="form-label">Price (₹) *</label>
                        <input type="number" name="price" class="form-control" step="0.01" min="0" placeholder="1000" required>
                    </div>
                </div>
                <div class="col-md-6">
                    <div class="form-group">
                        <label class="form-label">Duration</label>
                        <input type="text" name="duration" class="form-control" placeholder="per night / per hour">
                    </div>
                </div>
            </div>
            
            <button type="submit" class="btn-submit">
                <i class="bi bi-check-circle-fill"></i> Add Service
            </button>
        </form>
        
        <div class="text-center mt-3">
            <a href="{{ url_for('provider.services') }}" class="text-decoration-none">
                <i class="bi bi-arrow-left"></i> Back to Services
            </a>
        </div>
    </div>
</div>
{% endblock %}
