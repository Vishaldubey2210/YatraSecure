{% extends "base.html" %}

{% block title %}Provider Login - YatraSecure{% endblock %}

{% block content %}
<style>
    body {
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        min-height: 100vh;
    }
    
    .login-container {
        max-width: 500px;
        margin: 80px auto;
        padding: 0 20px;
    }
    
    .login-card {
        background: white;
        border-radius: 25px;
        padding: 50px;
        box-shadow: 0 10px 40px rgba(0,0,0,0.2);
    }
    
    .login-header {
        text-align: center;
        margin-bottom: 40px;
    }
    
    .login-icon {
        width: 80px;
        height: 80px;
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        margin: 0 auto 20px;
        color: white;
        font-size: 2.5rem;
    }
    
    .login-title {
        font-size: 2rem;
        font-weight: 700;
        color: #333;
        margin-bottom: 10px;
    }
    
    .login-subtitle {
        color: #666;
    }
    
    .form-group {
        margin-bottom: 25px;
    }
    
    .form-label {
        font-weight: 600;
        color: #333;
        margin-bottom: 8px;
        display: block;
    }
    
    .form-control {
        width: 100%;
        padding: 12px 18px;
        border: 2px solid #e0e0e0;
        border-radius: 12px;
        font-size: 1rem;
        transition: all 0.3s ease;
    }
    
    .form-control:focus {
        border-color: #667eea;
        outline: none;
        box-shadow: 0 0 0 0.2rem rgba(102, 126, 234, 0.15);
    }
    
    .btn-login {
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        color: white;
        border: none;
        padding: 15px;
        border-radius: 12px;
        font-size: 1.1rem;
        font-weight: 600;
        width: 100%;
        cursor: pointer;
        transition: all 0.3s ease;
    }
    
    .btn-login:hover {
        transform: translateY(-2px);
        box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4);
    }
    
    .divider {
        text-align: center;
        margin: 25px 0;
        color: #999;
    }
    
    .signup-link {
        text-align: center;
        margin-top: 20px;
    }
</style>

<div class="login-container">
    <div class="login-card">
        <div class="login-header">
            <div class="login-icon">
                <i class="bi bi-shop"></i>
            </div>
            <h2 class="login-title">Provider Login</h2>
            <p class="login-subtitle">Manage your services and bookings</p>
        </div>
        
        <form method="POST" action="{{ url_for('provider.provider_login') }}">
            <div class="form-group">
                <label class="form-label">
                    <i class="bi bi-envelope-fill text-primary"></i> Email
                </label>
                <input type="email" name="email" class="form-control" placeholder="your@email.com" required>
            </div>
            
            <div class="form-group">
                <label class="form-label">
                    <i class="bi bi-lock-fill text-primary"></i> Password
                </label>
                <input type="password" name="password" class="form-control" placeholder="••••••••" required>
            </div>
            
            <button type="submit" class="btn-login">
                <i class="bi bi-box-arrow-in-right"></i> Login
            </button>
        </form>
        
        <div class="divider">OR</div>
        
        <div class="signup-link">
            <p>Don't have an account?</p>
            <a href="{{ url_for('provider.provider_signup') }}" class="btn btn-outline-primary">
                <i class="bi bi-person-plus"></i> Register as Provider
            </a>
        </div>
        
        <div class="text-center mt-3">
            <a href="{{ url_for('index') }}" class="text-decoration-none">
                <i class="bi bi-arrow-left"></i> Back to Home
            </a>
        </div>
    </div>
</div>
{% endblock %}
